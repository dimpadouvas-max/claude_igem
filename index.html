<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic-Tac-Toe</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; margin-top: 40px; }
  #board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; }
  .cell { width: 100px; height: 100px; font-size: 2.5em; display: flex; align-items: center; justify-content: center; background: #eee; cursor: pointer; }
  #status { margin: 15px; font-size: 1.2em; }
  button { padding: 6px 16px; font-size: 1em; cursor: pointer; }
</style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status"></div>
  <div id="board"></div>
  <button onclick="reset()">Restart</button>

<script>
let cells = Array(9).fill(null);
let turn = 'X';
let over = false;
const board = document.getElementById('board');
const status = document.getElementById('status');
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function render() {
  board.innerHTML = '';
  cells.forEach((v, i) => {
    const c = document.createElement('div');
    c.className = 'cell';
    c.textContent = v || '';
    c.onclick = () => move(i);
    board.appendChild(c);
  });
}

function move(i) {
  if (over || cells[i]) return;
  cells[i] = turn;
  const win = wins.find(w => w.every(j => cells[j] === turn));
  if (win) {
    status.textContent = turn + ' wins!';
    over = true;
  } else if (cells.every(Boolean)) {
    status.textContent = "It's a draw!";
    over = true;
  } else {
    turn = turn === 'X' ? 'O' : 'X';
    status.textContent = turn + "'s turn";
  }
  render();
}

function reset() {
  cells = Array(9).fill(null);
  turn = 'X';
  over = false;
  status.textContent = turn + "'s turn";
  render();
}

reset();
</script>
</body>
</html>
